<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BJP Bengal - Pixel Perfect UI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Hind font Hindi ke liye best hai, bilkul image jaisa dikhta hai -->
    <link href="https://fonts.googleapis.com/css2?family=Hind:wght@400;500;600;700&family=Poppins:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Hind', sans-serif; 
            background-color: #d1d5db; 
            margin: 0;
            display: flex;
            justify-content: center;
        }
        
        .main-container {
            width: 100%;
            max-width: 450px;
            background: #ffffff;
            min-height: 100vh;
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.2);
        }

        /* Pixel Perfect Header Styling */
        .header-box {
            width: 100%;
            line-height: 0;
        }
        .header-img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Lotus & Text Styling - Exact Match */
        .section-title-box {
            padding: 25px 10px;
            text-align: center;
        }
        .lotus-svg {
            width: 28px;
            height: 28px;
        }
        .line-orange {
            height: 2px;
            width: 40px;
            background-color: #f97316;
            opacity: 0.6;
        }

        /* Scratch Card - Exact Borders from Image */
        .scratch-outer-frame {
            width: 310px;
            height: 310px;
            margin: 0 auto;
            background: linear-gradient(180deg, #ff8c00 0%, #ff5e00 100%);
            border-radius: 40px;
            padding: 12px; /* Border gap */
            position: relative;
            /* Inset shadow for depth like image */
            box-shadow: 0 15px 35px rgba(255, 94, 0, 0.4), inset 0 0 15px rgba(255,255,255,0.2);
        }

        .scratch-inner-white {
            width: 100%;
            height: 100%;
            background: #ffffff;
            border-radius: 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            border: 2px solid #fff7ed;
        }

        #scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 30;
            border-radius: 40px;
            cursor: pointer;
            touch-action: none;
        }

        /* Custom Bold Font Weights for Hindi */
        .hindi-bold { font-weight: 700; color: #1f2937; }
        .hindi-extra-bold { font-weight: 700; font-size: 1.25rem; }

        /* Button Styling - 100% Match */
        .btn-bank {
            background: linear-gradient(90deg, #f97316 0%, #fb923c 100%);
            box-shadow: 0 12px 24px rgba(249, 115, 22, 0.3);
            border-radius: 20px;
            transition: transform 0.1s ease;
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <!-- 1. Header Image (Same to Same) -->
    <div class="header-box">
        <img src="https://i.ibb.co/qYCWfZPg/Screenshot-2026-05-06-075853.png" class="header-img" alt="BJP Header">
    </div>

    <!-- 2. Section Title with Lotus & Lines -->
    <div class="section-title-box">
        <div class="flex items-center justify-center gap-3 mb-1">
            <div class="line-orange"></div>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bharatiya_Janata_Party_logo.svg/1200px-Bharatiya_Janata_Party_logo.svg.png" class="lotus-svg">
            <h2 class="hindi-bold text-lg tracking-tight">अपना लाभ जानने के लिए स्क्रैच करें</h2>
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bharatiya_Janata_Party_logo.svg/1200px-Bharatiya_Janata_Party_logo.svg.png" class="lotus-svg">
            <div class="line-orange"></div>
        </div>
        <p class="text-[11px] font-medium text-gray-500">स्क्रैच कार्ड को पूरा स्क्रैच करें और अपना लाभ राशि जानें</p>
    </div>

    <!-- 3. Scratch Card with Perfect Borders -->
    <div class="scratch-outer-frame">
        <div class="scratch-inner-white">
            <!-- Hidden Result -->
            <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/1e/Bharatiya_Janata_Party_logo.svg/1200px-Bharatiya_Janata_Party_logo.svg.png" class="w-10 opacity-10 mb-2">
            <p class="text-[10px] uppercase font-bold text-gray-400 tracking-tighter">Official Benefit Amount</p>
            <h3 class="text-6xl font-black text-gray-800" style="font-family: 'Poppins';">₹3000</h3>
            <p class="text-orange-600 font-bold text-xs mt-1">Sashakt Nari Yojana</p>
        </div>
        <!-- Overlay Canvas (Your Image) -->
        <canvas id="scratch-canvas"></canvas>
    </div>

    <!-- 4. Security Badge Section -->
    <div class="text-center mt-8">
        <div class="inline-flex items-center gap-2 bg-green-50 border border-green-100 px-4 py-1.5 rounded-full shadow-sm">
            <div class="bg-green-700 text-white rounded-full p-0.5">
                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="4" d="M5 13l4 4L19 7"></path></svg>
            </div>
            <span class="text-[10px] font-bold text-green-800">यह 100% सुरक्षित है | आपकी जानकारी पूरी तरह सुरक्षित है</span>
        </div>
    </div>

    <!-- 5. Bottom Action Button Section -->
    <div class="px-8 mt-8 pb-10">
        <button class="btn-bank w-full text-white flex items-center justify-between px-6 py-5 active:scale-95">
            <div class="bg-white p-2 rounded-full shadow-inner">
                <svg class="w-6 h-6 text-orange-600" fill="currentColor" viewBox="0 0 24 24"><path d="M4 10v7h3v-7H4zm6 0v7h3v-7h-3zM2 22h19v-3H2v3zm14-12v7h3v-7h-3zm-4.5-9L2 6v2h19V6l-9.5-5z"/></svg>
            </div>
            <span class="text-xl font-bold tracking-tight" style="font-family: 'Poppins';">Send money to your bank</span>
            <span class="text-2xl font-black">→</span>
        </button>
        <p class="text-center text-[10px] text-gray-400 mt-4 font-semibold italic">
            ₹ राशि सीधे आपके बैंक खाते में भेजी जाएगी
        </p>
    </div>

</div>

<script>
    const canvas = document.getElementById('scratch-canvas');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });
    const scratchImage = new Image();
    
    // Scratch Card Image URL
    scratchImage.crossOrigin = "anonymous";
    scratchImage.src = 'https://i.ibb.co/8gVdnx2Y/Screenshot-2026-05-06-075755.png';

    scratchImage.onload = () => {
        canvas.width = 310;
        canvas.height = 310;
        ctx.drawImage(scratchImage, 0, 0, 310, 310);
    };

    let isScratching = false;

    function getPosition(e) {
        const rect = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return {
            x: clientX - rect.left,
            y: clientY - rect.top
        };
    }

    function handleMove(e) {
        if (!isScratching) return;
        e.preventDefault();
        const pos = getPosition(e);
        
        ctx.globalCompositeOperation = 'destination-out';
        ctx.beginPath();
        ctx.arc(pos.x, pos.y, 35, 0, Math.PI * 2);
        ctx.fill();
    }

    canvas.addEventListener('mousedown', () => isScratching = true);
    window.addEventListener('mouseup', () => isScratching = false);
    canvas.addEventListener('mousemove', handleMove);
    
    canvas.addEventListener('touchstart', (e) => { isScratching = true; handleMove(e); });
    canvas.addEventListener('touchend', () => isScratching = false);
    canvas.addEventListener('touchmove', handleMove);
</script>

</body>
</html>
